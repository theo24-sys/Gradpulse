[phases.setup]
nixPkgs = ["python3", "postgresql_16.dev", "gcc"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && /opt/venv/bin/pip install -r requirements.txt"]

[phases.build]
cmds = ["/opt/venv/bin/python manage.py collectstatic --noinput"]

[deploy]
startCmd = "/opt/venv/bin/python manage.py migrate --noinput && /opt/venv/bin/gunicorn gradpulse.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120"