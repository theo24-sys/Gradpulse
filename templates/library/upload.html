{% extends 'campus/layout.html' %}
{% load static %}

{% block title %}Share Resource — GradPulse{% endblock %}

{% block campus_content %}
<div class="gp-content p-0 m-0">
    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="gp-card animate-fade-up">
                    <div class="gp-card-header d-flex align-items-center gap-3">
                        <a href="{% url 'library_list' %}" class="btn btn-light btn-sm rounded-circle"><i class="fa fa-arrow-left"></i></a>
                        <h4 class="mb-0 fw-bold">Share a Resource</h4>
                    </div>
                    <div class="gp-card-body">
                        <p class="text-muted small mb-4">Help fellow students by sharing books, course outlines, or study notes.</p>
                        
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">Title</label>
                                <input type="text" name="title" class="form-control" placeholder="e.g. Introduction to Algorithms 4th Ed" required>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Category</label>
                                    <select name="category" class="form-select">
                                        {% for cat_val, cat_label in categories %}
                                        <option value="{{ cat_val }}">{{ cat_label }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Course Name</label>
                                    <input type="text" name="course_name" class="form-control" placeholder="e.g. CS101" value="{{ user.course }}">
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Institution</label>
                                <input type="text" name="institution" class="form-control" value="{{ user.institution }}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">File (PDF, Doc, Image)</label>
                                <input type="file" name="file" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">External Link (Optional)</label>
                                <input type="url" name="external_link" class="form-control" placeholder="https://...">
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Description</label>
                                <textarea name="description" class="form-control" rows="3" placeholder="Briefly describe what this internal/external resource is about..."></textarea>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn gp-btn-navy py-2">
                                    <i class="fa fa-cloud-upload-alt me-2"></i>Publish to Library
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
