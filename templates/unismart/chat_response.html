<div class="chat-message ai-message mb-3">
    <div class="d-flex align-items-start">
        <div class="flex-shrink-0 me-3">
            <div class="bg-warning text-white rounded-circle d-flex align-items-center justify-content-center" style="width:40px;height:40px;">
                <i class="fa fa-robot"></i>
            </div>
        </div>
        <div class="flex-grow-1">
            <div class="bg-light p-3 rounded-3 shadow-sm">
                {{ response|safe|linebreaks }}
                
                {% if mentor %}
                <div class="mentor-recommendation mt-3 p-3 bg-white rounded-3 border border-warning">
                    <h6 class="fw-bold text-orange mb-2"><i class="fa fa-user-check me-2"></i>Recommended Mentor</h6>
                    <div class="d-flex align-items-center">
                        <img src="{{ mentor.get_avatar_url }}" alt="{{ mentor.display_name }}" class="rounded-circle me-3" style="width:45px;height:45px;object-fit:cover;">
                        <div>
                            <div class="fw-bold">{{ mentor.display_name }}</div>
                            <div class="text-muted small">{{ mentor.course }} @ {{ mentor.institution }}</div>
                        </div>
                        <a href="{% url 'networking' %}" class="btn btn-sm btn-outline-warning ms-auto">Connect <i class="fa fa-paper-plane ms-1"></i></a>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
