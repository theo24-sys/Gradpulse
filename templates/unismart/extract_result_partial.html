{% if error %}
<div class="alert alert-danger mb-0 py-2">
    <i class="fas fa-exclamation-circle me-1"></i> {{ error }}
</div>
{% else %}
<div class="alert alert-success mb-0 py-2 animate-fade-in">
    <i class="fas fa-check-circle me-1"></i> Extracted {{ count }} courses from "{{ title }}"! 
    <a href="{% url 'unismart_course_browser' %}" class="alert-link ms-2 fw-bold text-decoration-underline">View Courses</a>
</div>
{% endif %}
